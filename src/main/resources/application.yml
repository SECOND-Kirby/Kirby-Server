server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expire-time: ${JWT_ACCESS_EXPIRE_TIME:3600000}    # 1시간 (밀리초)
  refresh-token-expire-time: ${JWT_REFRESH_EXPIRE_TIME:604800000} # 7일 (밀리초)

robot:
  api:
    base-url: ${ROBOT_API_URL}
    timeout: ${ROBOT_API_TIMEOUT}
    connection-timeout: 3000
    read-timeout: 5000

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.scheduling: WARN
