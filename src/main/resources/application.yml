server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  secret: ${JWT_SECRET}
  access-token-expire-time: ${JWT_ACCESS_EXPIRE_TIME:3600000}
  refresh-token-expire-time: ${JWT_REFRESH_EXPIRE_TIME:604800000}

robot:
  api:
    base-url: ${ROBOT_API_URL}
    timeout: ${ROBOT_API_TIMEOUT}
    connection-timeout: 3000
    read-timeout: 5000

file:
  storage:
    upload-dir: ./uploads
    profile-image-dir: profiles
    max-file-size: 5242880

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  metrics:
    tags:
      application: kirby
      environment: production
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

logging:
  file:
    name: ./logs/application.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    org.hibernate.SQL: WARN
    org.springframework.scheduling: WARN
    com.second.kirby: INFO